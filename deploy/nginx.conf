# ============================================================================
# Nexus AI Agent — nginx reverse proxy.
# Asosiy nozik joy: SSE (Server-Sent Events) oqimlari bufferlanmasligi kerak,
# aks holda /chat/stream va /agent/stream real vaqtda ishlamaydi.
# ============================================================================

upstream nexus_backend {
    server backend:8000;
    keepalive 32;
}

server {
    listen 80;
    server_name _;

    # Yuklanadigan hujjatlar uchun (RAG /rag/upload) tana hajmi chegarasi.
    client_max_body_size 10m;

    # Proxy umumiy sozlamalari.
    proxy_http_version 1.1;
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # ---- SSE oqim endpointlari (bufferlash O'CHIRILGAN) --------------------
    location ~ ^/api/v1/(chat|agent)/stream$ {
        proxy_pass http://nexus_backend;
        proxy_set_header Connection "";

        # Real vaqt oqim uchun KRITIK sozlamalar:
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 3600s;
        chunked_transfer_encoding on;
        add_header X-Accel-Buffering no;
    }

    # ---- Oddiy API + healthcheck ------------------------------------------
    location / {
        proxy_pass http://nexus_backend;
        proxy_set_header Connection "";
        proxy_read_timeout 120s;
    }
}
