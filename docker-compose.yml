# ============================================================================
# Nexus AI Agent — production stack.
#   backend : FastAPI (gunicorn + uvicorn workerlari)
#   redis   : suhbat xotirasi / fakt saqlash (RedisMemory uchun)
#   nginx   : reverse proxy + SSE bufferlashni o'chirgan + (ixtiyoriy) TLS
#
# Ishga tushirish:  cp backend/.env.example backend/.env  →  to'ldiring
#                   docker compose up -d --build
# ============================================================================
services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: nexus-ai-backend:latest
    restart: unless-stopped
    env_file:
      - ./backend/.env
    environment:
      APP_ENV: production
      WEB_CONCURRENCY: ${WEB_CONCURRENCY:-2}
      REDIS_URL: redis://redis:6379
      MEMORY_BACKEND: ${MEMORY_BACKEND:-redis}
    depends_on:
      redis:
        condition: service_healthy
    expose:
      - "8000"
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "${HTTP_PORT:-80}:80"
    volumes:
      - ./deploy/nginx.conf:/etc/nginx/conf.d/default.conf:ro

volumes:
  redis_data:
